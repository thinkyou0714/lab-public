services:
  n8n:
    image: ${N8N_IMAGE:?set N8N_IMAGE in .env}
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      # Public-safe compose: secrets and host-specific values live in .env
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:?set N8N_BASIC_AUTH_USER in .env}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?set N8N_BASIC_AUTH_PASSWORD in .env}
      WEBHOOK_URL: ${WEBHOOK_URL:?set WEBHOOK_URL in .env}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Tokyo}
      TZ: ${TZ:-Asia/Tokyo}

volumes:
  n8n_data: