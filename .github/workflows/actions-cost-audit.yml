name: Actions Cost Audit

# Why this lives in lab-public:
#   Read-only audit of GitHub Actions compute consumption across private repos.
#   Public repos have unlimited free Actions, so this monitor itself burns
#   zero metered minutes regardless of how often it runs.
#
#   Companion to `private-actions-monitor.yml`:
#     - that monitor catches the blackout AFTER spending limit is hit
#     - THIS audit surfaces the top burners BEFORE the limit is hit
#       so the user can optimize them proactively
#
#   The 2026-05-25 → 2026-05-28 blackout (obsidian-vault#124) revealed that
#   one workflow (vault-audit.yml) was consuming ~5,500 sec/30d and several
#   others (think-you-lab/codeql.yml at ~7,900 sec, /lighthouse.yml at
#   ~2,260 sec) were unaddressed. This audit makes that data visible weekly.
#
#   This workflow runs ONLY on schedule and workflow_dispatch — never on
#   pull_request — so untrusted PR code can never read MONITOR_PAT.

on:
  schedule:
    - cron: '0 21 * * 0'   # weekly Sunday ~06:00 JST Monday (15 min after the daily monitor's window)
  workflow_dispatch:

permissions:
  issues: write             # to open / update the audit report Issue
  contents: read

concurrency:
  group: actions-cost-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate per-workflow compute consumption
        uses: actions/github-script@v7
        env:
          # Reuses MONITOR_PAT (the same fine-grained PAT that
          # `private-actions-monitor.yml` already uses). No new secret needed.
          # If MONITOR_PAT is missing, the audit degrades gracefully: it can
          # still read public repos but private repos in REPOS will report
          # "PAT scope insufficient".
          MONITOR_PAT: ${{ secrets.MONITOR_PAT }}
        with:
          script: |
            // Private repos with at least one workflow file. Public repos
            // (codex-toolkit, zenn-content) have unlimited free Actions
            // and contribute zero to monthly minute consumption, so they
            // would always show ~0 sec and only add noise to the
            // ranking. claude-lab-config is private but has 0 workflows.
            // Keep this list and the one in `private-actions-monitor.yml`
            // in sync. See `docs/actions-cost-runbook.md` for guidance.
            // Added 2026-05-31: tyl-monorepo, lab-n8n-workflows, lab-infra
            // appeared on the account since the initial audit. lab-infra
            // alone has ~10.4k total runs across 33 workflows — likely
            // the single largest Actions consumer on the account, was
            // unaudited before this addition. See monitor-config.json.
            const REPOS = [
              'thinkyou0714/obsidian-vault',
              'thinkyou0714/think-you-lab',
              'thinkyou0714/n8n',
              'thinkyou0714/nextjs-boilerplate',
              'thinkyou0714/lab-inbox-bot',
              'thinkyou0714/private-members',
              'thinkyou0714/tyl-monorepo',
              'thinkyou0714/lab-n8n-workflows',
              'thinkyou0714/lab-infra',
            ];
            const WINDOW_DAYS = 30;
            const ALERT_LABEL = 'actions-cost-report';
            // A workflow is flagged "heavy" if it exceeds EITHER threshold:
            //   - total compute > 3000 sec / 30d (~50 min/month), OR
            //   - avg per-run > 120 sec AND fired > 10 times
            // Both are conservative enough to avoid noise.
            const HEAVY_TOTAL_SEC = 3000;
            const HEAVY_AVG_SEC = 120;
            const HEAVY_MIN_RUNS = 10;

            const pat = process.env.MONITOR_PAT;
            const hasPat = pat && pat.length > 0;
            // Two failure modes already hit:
            //   1. `const octokit = ...` shadowed the github-script injected
            //      global of the same name → SyntaxError.
            //   2. `require('@octokit/rest')` failed → MODULE_NOT_FOUND
            //      (the package isn't installed in the v7 runner).
            // Workaround: use the injected `github` instance for every call
            // and pass the MONITOR_PAT inline via the Authorization header.
            // This avoids both pitfalls without adding a runtime dependency.
            const authHeader = hasPat
              ? { Authorization: `token ${pat}` }
              : {};

            const now = new Date();
            const windowStart = new Date(now.getTime() - WINDOW_DAYS * 86400_000);
            const isoDate = d => d.toISOString().slice(0, 10);
            const created = `${isoDate(windowStart)}..${isoDate(now)}`;

            // Per-repo aggregation
            const repoResults = [];
            for (const slug of REPOS) {
              const [owner, repo] = slug.split('/');
              try {
                // Paginate runs in the window (capped at 1000 = 10 pages)
                const runs = [];
                for (let page = 1; page <= 10; page++) {
                  const res = await github.request(
                    'GET /repos/{owner}/{repo}/actions/runs',
                    { owner, repo, per_page: 100, page, created, headers: authHeader }
                  );
                  const batch = res.data.workflow_runs || [];
                  runs.push(...batch);
                  if (batch.length < 100) break;
                }

                // Group by workflow path
                const byPath = new Map();
                for (const r of runs) {
                  const path = r.path || r.name || 'unknown';
                  if (!byPath.has(path)) {
                    byPath.set(path, {
                      path,
                      name: r.name,
                      runs: 0,
                      nonSf: 0,
                      totalSec: 0,
                    });
                  }
                  const row = byPath.get(path);
                  row.runs++;
                  if (r.conclusion !== 'startup_failure') {
                    row.nonSf++;
                    const start = new Date(r.run_started_at).getTime();
                    const end = new Date(r.updated_at).getTime();
                    const dur = Math.max(0, Math.floor((end - start) / 1000));
                    row.totalSec += dur;
                  }
                }
                const workflows = Array.from(byPath.values())
                  .map(w => ({
                    ...w,
                    avgSec: w.nonSf ? Math.round(w.totalSec / w.nonSf) : 0,
                    heavy:
                      w.totalSec > HEAVY_TOTAL_SEC ||
                      (w.avgSec > HEAVY_AVG_SEC && w.nonSf > HEAVY_MIN_RUNS),
                  }))
                  .sort((a, b) => b.totalSec - a.totalSec);

                const totalSec = workflows.reduce((s, w) => s + w.totalSec, 0);
                repoResults.push({
                  slug,
                  totalRuns: runs.length,
                  totalSec,
                  workflows,
                });
              } catch (e) {
                repoResults.push({ slug, error: `${e.status} ${e.message || ''}` });
              }
            }

            const errored = repoResults.filter(r => r.error);
            const ok = repoResults.filter(r => !r.error);
            const grandTotalSec = ok.reduce((s, r) => s + r.totalSec, 0);
            const grandTotalMin = Math.round(grandTotalSec / 60);
            const heavyCount = ok.reduce(
              (s, r) => s + (r.workflows || []).filter(w => w.heavy).length,
              0
            );

            // Console log (machine-readable trace)
            console.log(`Window: ${created} (${WINDOW_DAYS} days)`);
            console.log(`Total measured compute: ${grandTotalSec}s = ${grandTotalMin}min`);
            for (const r of ok) {
              console.log(
                `  ${r.slug}: ${r.totalSec}s across ${r.totalRuns} runs, ${
                  (r.workflows || []).filter(w => w.heavy).length
                } heavy workflow(s)`
              );
            }

            if (!hasPat) {
              core.warning(
                'MONITOR_PAT secret is not set; private repos may report errors. ' +
                  'See `private-actions-monitor.yml` comments for setup steps.'
              );
            }

            // Build report body
            const repoLines = ok
              .slice()
              .sort((a, b) => b.totalSec - a.totalSec)
              .map(r => {
                const min = Math.round(r.totalSec / 60);
                const pct = grandTotalSec
                  ? ((r.totalSec / grandTotalSec) * 100).toFixed(1)
                  : '0.0';
                return `| \`${r.slug}\` | ${r.totalSec} | ${min} | ${pct}% |`;
              })
              .join('\n');
            const repoTable =
              '| Repo | sec | min | % of measured budget |\n' +
              '|---|---:|---:|---:|\n' +
              repoLines;

            // Top-15 burners across all repos
            const allWorkflows = [];
            for (const r of ok) {
              for (const w of r.workflows || []) {
                allWorkflows.push({ slug: r.slug, ...w });
              }
            }
            const top = allWorkflows
              .sort((a, b) => b.totalSec - a.totalSec)
              .slice(0, 15);
            const topLines = top
              .map(
                w =>
                  `| \`${w.slug}\` | \`${w.path}\` | ${w.totalSec} | ${w.nonSf} | ${w.avgSec} | ${
                    w.heavy ? '⚠️' : ''
                  } |`
              )
              .join('\n');
            const topTable =
              '| Repo | Workflow | total sec | runs | avg sec | heavy |\n' +
              '|---|---|---:|---:|---:|:---:|\n' +
              topLines;

            const erroredNote = errored.length
              ? `\n\n_Could not audit_: ${errored
                  .map(r => `\`${r.slug}\` (${r.error})`)
                  .join(', ')}\n`
              : '';

            const body = [
              `## Actions cost audit — last ${WINDOW_DAYS} days`,
              ``,
              `**Window:** ${isoDate(windowStart)} → ${isoDate(now)} (UTC)`,
              `**Total measured non-startup-failure compute:** ${grandTotalSec} sec (~${grandTotalMin} min)`,
              `**Heavy workflows** (>${HEAVY_TOTAL_SEC}s total OR >${HEAVY_AVG_SEC}s avg with >${HEAVY_MIN_RUNS} runs): **${heavyCount}**`,
              ``,
              `### Per-repo breakdown`,
              ``,
              repoTable,
              ``,
              `### Top burners (15 most expensive workflows)`,
              ``,
              topTable,
              erroredNote,
              ``,
              `### What to do about heavy workflows`,
              ``,
              `See [\`docs/actions-cost-runbook.md\`](../blob/master/docs/actions-cost-runbook.md) for standard optimization patterns:`,
              `- **paths-ignore** — skip runs that touch only docs / generated reports / archives`,
              `- **concurrency cancel-in-progress** — drop superseded runs on rapid PR pushes`,
              `- **schedule cron reduction** — daily → weekly for low-signal audits`,
              `- **conditional steps** — skip downstream work when nothing relevant changed`,
              ``,
              `Diagnosis for the original blackout: **thinkyou0714/obsidian-vault#124**`,
              ``,
              `_This Issue was auto-opened by \`.github/workflows/actions-cost-audit.yml\`. It will be updated on subsequent audits; close manually once heavy workflows are optimized._`,
            ].join('\n');

            // Ensure the label exists (idempotent)
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: ALERT_LABEL,
                color: 'fbca04',
                description:
                  'Auto-opened by actions-cost-audit: cross-repo Actions compute consumption report',
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = already exists
            }

            // Dedup: find existing open Issue with the label
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ALERT_LABEL,
              per_page: 5,
            });

            if (openIssues.data.length > 0) {
              const issue = openIssues.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `### Re-audit at ${new Date().toISOString()}\n\n${body}`,
              });
              console.log(`Updated existing audit Issue #${issue.number}`);
              core.summary
                .addHeading(`Updated audit Issue #${issue.number}`)
                .write();
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📊 Actions cost audit (${isoDate(now)}) — ${grandTotalMin} min over ${WINDOW_DAYS}d, ${heavyCount} heavy workflow(s)`,
                body,
                labels: [ALERT_LABEL],
              });
              console.log(
                `Opened audit Issue #${created.data.number}: ${created.data.html_url}`
              );
              core.summary
                .addHeading(`Opened audit Issue #${created.data.number}`)
                .addLink('View issue', created.data.html_url)
                .write();
            }
